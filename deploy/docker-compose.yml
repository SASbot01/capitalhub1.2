name: capitalhub

services:
  # =====================================================
  # 1. BASE DE DATOS (MySQL)
  # =====================================================
  mysql:
    image: mysql:8.0
    container_name: capitalhub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: capitalhub
      MYSQL_PASSWORD: admin
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-padmin" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - capitalhub-network

  # =====================================================
  # 2. ALMACENAMIENTO (MinIO)
  # =====================================================
  minio:
    image: minio/minio
    container_name: capitalhub-minio
    restart: unless-stopped
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - capitalhub-network

  # =====================================================
  # 3. BACKEND (Spring Boot)
  # =====================================================
  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.backend
    container_name: capitalhub-backend
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/capitalhub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      JWT_SECRET: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970"
      JWT_EXPIRATION: "86400000"
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: capitalhub-media
      MINIO_PUBLIC_URL: http://localhost:9000

      # 👇 CONFIGURACIÓN DE CORREO (Google Workspace)
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: adrian@capitalhubapp.com
      MAIL_PASSWORD: "${MAIL_PASSWORD}"

      # 👇 STRIPE (Pagos)
      STRIPE_API_KEY: "${STRIPE_API_KEY}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"

      # 👇 HOTMART (Opcional - pagos alternativos)
      HOTMART_HOTTOK: "${HOTMART_HOTTOK:-}"

      # 👇 ANTHROPIC (Chatbot IA)
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"

      # 👇 URLS PÚBLICAS
      FRONTEND_URL: "https://capitalhub.es"

    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - capitalhub-network

  # =====================================================
  # 4. FRONTEND (React + Nginx)
  # =====================================================
  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.frontend
      args:
        # 👇 Dejar vacío para que Nginx proxee localmente por rutas relativas
        VITE_API_BASE_URL: ""
    container_name: capitalhub-frontend
    restart: unless-stopped
    ports:
      - "8084:80"
    depends_on:
      - backend
    networks:
      - capitalhub-network

  # =====================================================
  # 5. TÚNEL CLOUDFLARE (¡NUEVO!)
  # =====================================================
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: capitalhub-tunnel
    restart: always
    command: tunnel run
    environment:
      # 👇 TU TOKEN REAL (Ya puesto)
      - TUNNEL_TOKEN=eyJhIjoiZTI4YjU5NjQ4ZGI0ZTc1NTEwZDljNWE3MDQwZjFjNmMiLCJ0IjoiZDRiYzlhODAtZjA3OC00MjAzLTkxYWItYjJjMDgyNGQzMTZlIiwicyI6Ik1HWXlOakEyTW1ZdE5UY3laaTAwWlRCaUxXRm1OalV0TURFNFpEQTRaR1EyTkdVMSJ9
    depends_on:
      - frontend
      - backend
    networks:
      - capitalhub-network

volumes:
  mysql_data:
    name: deploy_mysql_data
    external: true
  minio_data:
    name: deploy_minio_data
    external: true


networks:
  capitalhub-network:
    driver: bridge
