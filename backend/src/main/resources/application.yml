server:
  port: 8081

spring:
  application:
    name: CapitalHub
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/capitalhub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  # Flyway configuration - disable validation to allow checksum mismatches
  flyway:
    enabled: true
    validate-on-migrate: false
    out-of-order: true
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000

minio:
  url: ${MINIO_URL:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:capitalhub-media}
  public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}

stripe:
  api-key: ${STRIPE_API_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

hotmart:
  hottok: ${HOTMART_HOTTOK:}
  client-id: ${HOTMART_CLIENT_ID:}
  client-secret: ${HOTMART_CLIENT_SECRET:}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: ${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
  max-tokens: ${ANTHROPIC_MAX_TOKENS:1024}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  admin-key: ${ADMIN_KEY:capitalhub-admin-2024}
